<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obol</title>
    <!-- Preload the two fonts on the critical render path. The full
         @font-face declarations live in src/app.css (self-hosted woff2). -->
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/Inter-400.woff2" />
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/InstrumentSerif-400.woff2" />
    <script>
      var saved = localStorage.getItem("theme");
      var sys = window.matchMedia("(prefers-color-scheme: dark)").matches;
      var theme = saved || (sys ? "dark" : "light");
      if (theme === "dark") document.documentElement.classList.add("dark");
      var skin = localStorage.getItem("obol_skin");
      // Migrate stored "paper" key to "neon" (renamed skin).
      if (skin === "paper") { skin = "neon"; localStorage.setItem("obol_skin", "neon"); }
      if (skin) document.documentElement.setAttribute("data-skin", skin);
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
